<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>JadeGate Badge API</title></head>
<body>
<script>
const params = new URLSearchParams(window.location.search);
const repo = params.get('repo');

if (repo) {
    // Redirect to shields.io endpoint
    const parts = repo.split('/');
    if (parts.length === 2) {
        const endpointUrl = `https://jadegate.io/api/badge/${parts[0]}/${parts[1]}.json`;
        window.location.href = `https://img.shields.io/endpoint?url=${encodeURIComponent(endpointUrl)}&link=${encodeURIComponent(`https://jadegate.io/verify/?repo=${repo}`)}`;
    } else {
        window.location.href = `https://img.shields.io/badge/JadeGate-Invalid_Repo-gray?style=flat-square`;
    }
} else {
    document.body.innerHTML = `
        <h1>💠 JadeGate Dynamic Badge API</h1>
        <h2>Recommended: shields.io endpoint (dynamic)</h2>
        <p>Badge is generated from the live verification registry. Unverified repos get a 404 (no green badge).</p>
        <pre>[![JadeGate Verified](https://img.shields.io/endpoint?url=https://jadegate.io/api/badge/YOUR_ORG/YOUR_REPO.json)](https://jadegate.io/verify/?repo=YOUR_ORG/YOUR_REPO)</pre>
        <p>Example:</p>
        <pre>[![JadeGate Verified](https://img.shields.io/endpoint?url=https://jadegate.io/api/badge/JadeGate/jade-core.json)](https://jadegate.io/verify/?repo=JadeGate/jade-core)</pre>
        <p><img src="https://img.shields.io/endpoint?url=https://jadegate.io/api/badge/JadeGate/jade-core.json" alt="JadeGate Verified"></p>
        <h2>How it works</h2>
        <ol>
            <li>Run <code>jade verify</code> in your repo's CI (via <a href="https://github.com/JadeGate/verify-action">verify-action</a>)</li>
            <li>On pass, your repo is added to the verification registry</li>
            <li>Badge JSON is auto-generated at <code>/api/badge/ORG/REPO.json</code></li>
            <li>shields.io reads the JSON and renders the badge dynamically</li>
            <li>Unregistered repos → 404 → no badge (can't be faked)</li>
        </ol>
        <h2>Trust levels</h2>
        <ul>
            <li>💠 <strong>Origin Verified</strong> — signed by root CA (green)</li>
            <li>🔷 <strong>Org Verified</strong> — signed by authorized org (blue)</li>
            <li>🔹 <strong>Community Verified</strong> — CI verification passed (green)</li>
        </ul>
    `;
}
</script>
</body>
</html>
